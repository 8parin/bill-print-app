services:
  - type: web
    name: bill-print-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false  # Set this in Render dashboard with your Neon DB URL
      - key: FLASK_ENV
        value: production
      - key: OUTPUT_DIR
        value: /tmp/output/bills
